name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'   # Adjust pin as .NET 10 stabilizes

      - name: Restore
        run: dotnet restore src/SqlCi.slnx

      - name: Build (Release)
        run: dotnet build src/SqlCi.slnx -c Release --no-restore

      - name: Test (Release)
        run: dotnet test src/SqlCi.slnx -c Release --no-build --logger "console;verbosity=minimal"
        # Note: Some integration tests (PostgreSql/SqlServer via Testcontainers) may be skipped
        # or require Docker. Sqlite in-memory tests always run and provide core coverage.
